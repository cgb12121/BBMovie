<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BBMovie Personalization Test</title>
    <link rel="stylesheet" href="test-streaming.css">
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo-container">
            <div class="logo">N</div>
            <h1>Personalized <span class="logo-gradient">Recommendations</span></h1>
        </div>
        <div class="header-actions">
            <a class="logs-btn" href="test-streaming.html" style="text-decoration:none;color:inherit;">← Stream test</a>
        </div>
    </div>

    <div class="left-panel">
        <div class="config-panel">
            <div class="config-header">
                <h2>Request config</h2>
            </div>
            <p style="font-size:12px;color:var(--netflix-text-secondary);margin:0 0 12px;">
                Calls <code>GET /api/personalization/v1/users/{userId}/recommendations?limit=...</code>
            </p>

            <div class="form-group">
                <label for="jwt"><span>🔑</span> JWT (optional if route is public)</label>
                <textarea id="jwt" placeholder="Bearer token..."></textarea>
            </div>
            <div class="form-group">
                <label for="apiGateway"><span>🌐</span> API gateway</label>
                <input type="text" id="apiGateway" value="http://localhost:8080">
            </div>
            <div class="form-group">
                <label for="userId"><span>👤</span> User ID (UUID)</label>
                <input type="text" id="userId" placeholder="00000000-0000-0000-0000-000000000000">
            </div>
            <div class="form-group">
                <label for="limit"><span>#</span> Limit</label>
                <input type="number" id="limit" value="20" min="1" max="100">
            </div>

            <button class="play-btn" type="button" id="loadBtn">
                <span>↻</span> Load recommendations
            </button>
            <p id="status" style="font-size:12px;margin-top:10px;color:var(--netflix-text-secondary);"></p>
        </div>
    </div>

    <div class="right-panel">
        <div class="video-info" style="max-width:none;">
            <h3>Recommendation items</h3>
            <div id="results" style="overflow-x:auto;"></div>
        </div>
    </div>
</div>
<script src="personalization-test.js"></script>
</body>
</html>
