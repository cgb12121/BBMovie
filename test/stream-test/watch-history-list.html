<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BBMovie Watch History (resume list)</title>
    <link rel="stylesheet" href="test-streaming.css">
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo-container">
            <div class="logo">N</div>
            <h1>Watch <span class="logo-gradient">History</span> (resume)</h1>
        </div>
        <div class="header-actions">
            <a class="logs-btn" href="test-streaming.html" style="text-decoration: none; color: inherit;">← Stream test</a>
        </div>
    </div>

    <div class="left-panel">
        <div class="config-panel">
            <div class="config-header">
                <h2>Saved positions</h2>
            </div>
            <p style="font-size: 12px; color: var(--netflix-text-secondary); margin: 0 0 12px;">
                This calls <code>GET /api/watch-history/v1/items</code> (per-user resume rows in Redis).
                <strong>Watchlist</strong> (collections) is a different API: <code>/api/watchlist/collections</code>.
            </p>

            <div class="form-group">
                <label for="jwt"><span>🔑</span> JWT</label>
                <textarea id="jwt" placeholder="Bearer token…"></textarea>
            </div>
            <div class="form-group">
                <label for="apiGateway"><span>🌐</span> API gateway</label>
                <input type="text" id="apiGateway" value="http://localhost:8080">
            </div>
            <button class="play-btn" type="button" id="loadBtn">
                <span>↻</span> Load my items
            </button>
            <p id="listStatus" style="font-size: 12px; margin-top: 10px; color: var(--netflix-text-secondary);"></p>
        </div>
    </div>

    <div class="right-panel">
        <div class="video-info" style="max-width: none;">
            <h3>Items</h3>
            <div id="tableWrap" style="overflow-x: auto;"></div>
        </div>
    </div>
</div>
<script src="watch-history-list.js"></script>
</body>
</html>
