version: '3.8'

services:
  mysql:
    env_file:
      - .env.mysql
    image: mysql:8.0
    command: --performance-schema=OFF --innodb-buffer-pool-size=128M
    container_name: shared_mysql
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    env_file:
      - .env.minio
    volumes:
      - C:/Users/buith_ejh62q2/Desktop/minio/data:/data
    command: server /data --console-address ":9001"
    depends_on:
      - nats
  minio-mc:
    image: minio/mc
    container_name: minio-setup
    env_file:
      - .env.minio-mc
    depends_on:
      - minio
    environment:
      - MINIO_HOST=${MINIO_HOST}
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}  
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
    volumes:
      - ./scripts/minio-init.sh:/minio-init.sh
    entrypoint: ["/bin/sh", "/minio-init.sh"]
  nats:
    image: nats:2.9-alpine
    container_name: nats_server
    command: >
      -js
      -DV
    ports:
      - "4222:4222"
      - "8222:8222" # for monitoring
  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: kafka_kraft
    ports:
      - "9092:9092"
    environment:
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_NODE_ID=1
      - KAFKA_CLUSTER_ID=abcdefghijklmnopqrstuv
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
    volumes:
      - kafka_data:/var/lib/kafka/data
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka_ui
    ports:
      - "8082:8080"
    depends_on:
      - kafka
    environment:
      - KAFKA_CLUSTERS_0_NAME=local-kraft
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
  qdrant:
    image: qdrant/qdrant:v1.16
    container_name: qdrant-demo
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API (optional)
      - "6334:6334"   # gRPC (Java client dùng cái này)
    environment:
       - QDRANT__STORAGE__ON_DISK_PAYLOAD=true # Save RAM (Offload payload to DISK)
       - QDRANT__SERVICE__ENABLE_TLS=false       # Turn off tls for local
    volumes:
      - qdrant_data:/qdrant/storage:z
      - qdrant_config:/qdrant/config:z
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.2.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - cluster.name=es-docker-cluster
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: [ "CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\\|yellow' || exit 1" ]
    deploy:
      resources:
        limits:
          memory: 2g

  redis-stack:
    image: redis/redis-stack:latest
    container_name: redis_stack
    ports:
      - "6379:6379"
      - "8001:8001" # RedisInsight
    volumes:
      - redis_data:/data

  consul:
    image: hashicorp/consul
    ports:
      - "8500:8500"

volumes:
  mysql_data:
  es_data:
  redis_data:
  kafka_data:
  clickhouse_data:
  qdrant_data:
  qdrant_config:
