spring.application.name=student-program-service
server.port=8096

# Auth toolkit test wiring
auth.jwt.mode=DEV_STATIC_JWK
auth.jwt.dev-static-jwk-path=classpath:jwk-dev.json
auth.jwt.claim.role=role
auth.jwt.claim.tier=tier

# Starter datasource defaults for local testing
spring.datasource.url=jdbc:mysql://localhost:3306/bbmovie_student_program?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=123456
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Temporal integration (disabled by default for local)
student-program.temporal.enabled=false
student-program.temporal.target=127.0.0.1:7233
student-program.temporal.namespace=default
student-program.temporal.task-queue=student-program-verification
