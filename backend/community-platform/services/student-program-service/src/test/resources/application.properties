spring.datasource.url=jdbc:h2:mem:student_program;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

auth.jwt.mode=DEV_STATIC_JWK
auth.jwt.dev-static-jwk-path=classpath:jwk-dev.json
student-program.temporal.enabled=false
