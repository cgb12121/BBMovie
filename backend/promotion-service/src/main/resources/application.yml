spring:
  application:
    name: promotion-service
  datasource:
    url: ${DATABASE_URL:jdbc:mysql://localhost:3306/bbmovie_promotion}
    username: ${DATABASE_USERNAME:root}
    password: ${DATABASE_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8083

drools:
  service:
    url: ${DROOLS_SERVICE_URL:http://localhost:8081/api/rules/evaluate-promotion}
