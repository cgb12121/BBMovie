spring.application.name=vvs
server.port=8507

temporal.enabled=true
temporal.target=${TEMPORAL_TARGET:localhost:7233}
temporal.namespace=${TEMPORAL_NAMESPACE:default}

vvs.worker.register=true

minio.url=${MINIO_API_URL:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
minio.secret-key=${MINIO_SECRET_KEY:minioadmin}

app.media-processing.hls-bucket=${HLS_BUCKET:bbmovie-hls}
app.media-processing.ffprobe-path=${FFPROBE_PATH:ffprobe}

# VVS validation controls
app.media-processing.vvs-deep-validation-enabled=${VVS_DEEP_VALIDATION_ENABLED:true}
app.media-processing.vvs-deep-sample-segments=${VVS_DEEP_SAMPLE_SEGMENTS:2}
app.media-processing.segment-download-timeout-seconds=${VVS_SEGMENT_DOWNLOAD_TIMEOUT_SECONDS:30}

# VVS conformance allowlists (empty => allow all)
app.media-processing.allowed-video-codecs=${VVS_ALLOWED_VIDEO_CODECS:h264,hevc,av1}
app.media-processing.allowed-audio-codecs=${VVS_ALLOWED_AUDIO_CODECS:aac,eac3,opus}
app.media-processing.allowed-pix-fmts=${VVS_ALLOWED_PIX_FMTS:yuv420p,yuv420p10le}
app.media-processing.allowed-audio-channels=${VVS_ALLOWED_AUDIO_CHANNELS:2,6}
app.media-processing.allowed-audio-sample-rates=${VVS_ALLOWED_AUDIO_SAMPLE_RATES:48000}
app.media-processing.require-audio-stream=${VVS_REQUIRE_AUDIO_STREAM:true}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
