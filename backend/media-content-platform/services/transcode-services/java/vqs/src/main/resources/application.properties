spring.application.name=vqs
server.port=8508

temporal.enabled=true
temporal.target=${TEMPORAL_TARGET:localhost:7233}
temporal.namespace=${TEMPORAL_NAMESPACE:default}

vqs.worker.register=true

minio.url=${MINIO_API_URL:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
minio.secret-key=${MINIO_SECRET_KEY:minioadmin}

app.media-processing.hls-bucket=${HLS_BUCKET:bbmovie-hls}
app.media-processing.ffprobe-path=${FFPROBE_PATH:ffprobe}
app.media-processing.ffmpeg-path=${FFMPEG_PATH:ffmpeg}
app.media-processing.vmaf-enabled=${VMAF_ENABLED:true}
app.media-processing.vmaf-pass-threshold-mean=${VMAF_PASS_THRESHOLD_MEAN:93.0}
app.media-processing.vmaf-pass-threshold-p10=${VMAF_PASS_THRESHOLD_P10:88.0}
app.media-processing.vmaf-pass-threshold-worst-window=${VMAF_PASS_THRESHOLD_WORST_WINDOW:85.0}
app.media-processing.vmaf-worst-window-seconds=${VMAF_WORST_WINDOW_SECONDS:3}
app.media-processing.vmaf-threads=${VMAF_THREADS:4}
app.media-processing.vmaf-timeout-seconds=${VMAF_TIMEOUT_SECONDS:1800}
app.media-processing.vmaf-model-path=${VMAF_MODEL_PATH:}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
