spring.application.name=vqs
server.port=8090

temporal.enabled=true
temporal.target=${TEMPORAL_TARGET:localhost:7233}
temporal.namespace=${TEMPORAL_NAMESPACE:default}

vqs.worker.register=false

minio.url=${MINIO_API_URL:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
minio.secret-key=${MINIO_SECRET_KEY:minioadmin}

app.media-processing.hls-bucket=${HLS_BUCKET:bbmovie-hls}
app.media-processing.ffprobe-path=${FFPROBE_PATH:ffprobe}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
