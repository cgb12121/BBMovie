spring.application.name=cas
server.port=8083

temporal.target=localhost:7233
temporal.namespace=default

# When false, uses in-memory stubs for analyze/manifest/subtitles (tests). When true (default), MinIO + ffprobe (requires binaries on PATH).
cas.processing.enabled=${CAS_PROCESSING_ENABLED:true}
# Heuristic CAS + legacy ladder/cost (ported from transcode-worker). When false, analyzeSource skips complexity (returns basic profile only in logs path — actually returns basic profile internally).
cas.complexity.enabled=${CAS_COMPLEXITY_ENABLED:true}

minio.url=${MINIO_API_URL:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
minio.secret-key=${MINIO_SECRET_KEY:minioadmin}

app.media-processing.hls-bucket=${MINIO_HLS_BUCKET:bbmovie-hls}
app.media-processing.movies-key-prefix=movies
app.media-processing.temp-dir=${TEMP_DIR:${java.io.tmpdir}}
app.media-processing.ffprobe-path=${FFPROBE_PATH:ffprobe}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
