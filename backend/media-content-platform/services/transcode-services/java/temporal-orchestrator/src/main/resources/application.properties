spring.application.name=temporal-orchestrator

# When false, Temporal client/workers are not started (see src/test/resources/application.properties).
# temporal.enabled=false

temporal.target=${TEMPORAL_TARGET:localhost:7233}
temporal.namespace=${TEMPORAL_NAMESPACE:default}
temporal.orchestrator-task-queue=${TEMPORAL_ORCHESTRATOR_TASK_QUEUE:orchestrator-queue}
temporal.register-stub-activity-workers=${TEMPORAL_REGISTER_STUB_ACTIVITY_WORKERS:true}
# stub = in-memory fake (default). processing = MinIO + FFmpeg (requires minio.* and ffmpeg on PATH).
temporal.activity-implementation=${TEMPORAL_ACTIVITY_IMPLEMENTATION:stub}

minio.url=${MINIO_API_URL:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
minio.secret-key=${MINIO_SECRET_KEY:minioadmin}

app.media-processing.hls-bucket=${MINIO_HLS_BUCKET:bbmovie-hls}
app.media-processing.movies-key-prefix=movies
app.media-processing.temp-dir=${TEMP_DIR:${java.io.tmpdir}}
app.media-processing.ffmpeg-path=${FFMPEG_PATH:ffmpeg}
app.media-processing.ffprobe-path=${FFPROBE_PATH:ffprobe}

app.transcode.nats-bridge.enabled=${NATS_BRIDGE_ENABLED:false}
app.transcode.nats-bridge.max-ack-pending=${NATS_BRIDGE_MAX_ACK_PENDING:4}

nats.url=${NATS_URL:nats://localhost:4222}
nats.minio.subject=${NATS_MINIO_SUBJECT:minio.events}
nats.stream.name=${NATS_STREAM_NAME:BBMOVIE}
nats.consumer.durable=${NATS_CONSUMER_DURABLE:temporal-orchestrator}
nats.consumer.ack-wait-minutes=${NATS_CONSUMER_ACK_WAIT_MINUTES:5}
nats.consumer.heartbeat-interval-seconds=${NATS_CONSUMER_HEARTBEAT_INTERVAL_SECONDS:30}
nats.consumer.fetch-batch-size=${NATS_CONSUMER_FETCH_BATCH_SIZE:5}
nats.consumer.fetch-timeout-seconds=${NATS_CONSUMER_FETCH_TIMEOUT_SECONDS:2}

management.endpoints.web.exposure.include=health,info
