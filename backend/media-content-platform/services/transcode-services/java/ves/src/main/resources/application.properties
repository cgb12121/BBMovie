spring.application.name=ves
server.port=8088

temporal.enabled=true
temporal.target=${TEMPORAL_TARGET:localhost:7233}
temporal.namespace=${TEMPORAL_NAMESPACE:default}
temporal.max-concurrent-activity-executions=${VES_MAX_CONCURRENT_ACTIVITY_EXECUTIONS:8}
temporal.max-concurrent-activity-task-pollers=${VES_MAX_CONCURRENT_ACTIVITY_TASK_POLLERS:4}

ves.worker.register=true

minio.url=${MINIO_API_URL:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
minio.secret-key=${MINIO_SECRET_KEY:minioadmin}

app.media-processing.hls-bucket=${HLS_BUCKET:bbmovie-hls}
app.media-processing.movies-key-prefix=${MOVIES_KEY_PREFIX:movies}
app.media-processing.ffmpeg-path=${FFMPEG_PATH:ffmpeg}
app.media-processing.ffmpeg-threads=${FFMPEG_THREADS_PER_TASK:1}
app.media-processing.upload-parallelism=${UPLOAD_PARALLELISM:8}
app.media-processing.stream-presign-expiry-seconds=${STREAM_PRESIGN_EXPIRY_SECONDS:21600}
app.media-processing.stream-retry-attempts=${STREAM_RETRY_ATTEMPTS:3}
app.media-processing.stream-retry-backoff-millis=${STREAM_RETRY_BACKOFF_MILLIS:3000}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
