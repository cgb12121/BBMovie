spring.application.name=ves-test
temporal.enabled=false
ves.worker.register=false
temporal.max-concurrent-activity-executions=2
temporal.max-concurrent-activity-task-pollers=1

minio.url=http://127.0.0.1:9000
minio.access-key=test
minio.secret-key=test

app.media-processing.ffmpeg-path=ffmpeg
app.media-processing.ffmpeg-threads=1
app.media-processing.upload-parallelism=2
app.media-processing.stream-presign-expiry-seconds=3600
app.media-processing.stream-retry-attempts=2
app.media-processing.stream-retry-backoff-millis=100
