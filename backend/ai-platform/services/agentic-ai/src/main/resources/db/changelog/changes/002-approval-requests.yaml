databaseChangeLog:
  - changeSet:
      id: "5"
      author: antigravity
      changes:
        - createTable:
            tableName: approval_request
            columns:
              - column:
                  name: request_id
                  type: VARCHAR(50)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: tool_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: action
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: risk_level
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: arguments
                  type: TEXT
                  constraints:
                    nullable: true
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: session_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: message_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
