server.port=8080
spring.application.name=agentic-ai
spring.ai.mcp.client.name=agentic-ai-client
spring.ai.mcp.client.type=async
spring.ai.mcp.client.sse.connections.mcp-server.url=http://localhost:8081/mcp/sse
spring.ai.ollama.chat.options.model=qwen3:0.6b

# Redis (Short-Term Memory)
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.datasource=0

spring.main.allow-bean-definition-overriding=true

# PostgreSQL R2DBC (Long-Term Storage)
spring.r2dbc.url=r2dbc:postgresql://localhost:5432/bbmovie
spring.r2dbc.username=postgres
spring.r2dbc.password=postgres

# PostgreSQL JDBC for Liquibase
spring.datasource.url=jdbc:postgresql://localhost:5432/bbmovie
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.liquibase.change-log=classpath:/db/changelog/db.changelog-master.yaml

# Qdrant (Semantic Memory)
spring.ai.vectorstore.qdrant.host=localhost
spring.ai.vectorstore.qdrant.port=6334
spring.ai.vectorstore.qdrant.api-key=

spring.shell.interactive.enabled=true
spring.shell.script.enabled=true
spring.shell.command.script.enabled=true