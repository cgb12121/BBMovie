server.port=8080
spring.application.name=agentic-ai
spring.ai.mcp.client.name=agentic-ai-client
spring.ai.mcp.client.type=async
spring.ai.mcp.client.sse.connections.mcp-server.url=http://localhost:8081/mcp/sse
spring.ai.ollama.chat.options.model=qwen3:0.6b
spring.ai.ollama.embedding.options.model=embeddinggemma:latest

# Google AI Studio (Gemini)
spring.ai.google.genai.api-key=${GEMINI_API_KEY}

# Groq (via OpenAI Adapter)
spring.ai.openai.api-key=${GROQ_API_KEY}
spring.ai.openai.base-url=https://api.groq.com/openai/v1

# Redis (Short-Term Memory)
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.datasource=0

spring.main.allow-bean-definition-overriding=true

# PostgreSQL R2DBC (Long-Term Storage)
spring.r2dbc.url=r2dbc:postgresql://localhost:5432/bbmovie
spring.r2dbc.username=postgres
spring.r2dbc.password=postgres

# PostgreSQL JDBC for Liquibase
spring.datasource.url=jdbc:postgresql://localhost:5432/bbmovie
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.liquibase.change-log=classpath:/db/changelog/db.changelog-master.yaml

# Qdrant (Semantic Memory)
spring.ai.vectorstore.qdrant.host=localhost
spring.ai.vectorstore.qdrant.port=6334
spring.ai.vectorstore.qdrant.api-key=

# NATS JetStream (Event-Driven Memory)
nats.url=nats://localhost:4222
nats.memory.subject=ai.memory.sync
nats.memory.queue=memory-workers

# Logging Configuration
logging.pattern.console=%clr(%d{HH:mm:ss.SSS}){faint} %clr(%5p) %clr([%15.15t]){cyan} %clr(%-40.40logger{39}){yellow} : %m%n
logging.level.bbmovie.ai_platform.agentic_ai=INFO
logging.level.org.springframework.ai=INFO