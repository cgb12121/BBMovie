spring.application.name=homepage-recommendations
server.port=8101

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.database=${REDIS_DB:0}

jose.jwk.endpoint=${JWK_ENDPOINT:http://localhost:8765/.well-known/jwks.json}

eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

homepage.recommendations.trending.daily-key-prefix=homepage:trending:day
homepage.recommendations.trending.merge-window-days=7
homepage.recommendations.trending.daily-key-ttl-days=8
homepage.recommendations.trending.gravity=1.8
homepage.recommendations.trending.completed-delta=3
homepage.recommendations.trending.partial-delta=1
homepage.recommendations.trending.zone-id=UTC
homepage.recommendations.trending.union-temp-key-prefix=homepage:trending:union:tmp:
homepage.recommendations.trending.batch.enabled=true
homepage.recommendations.trending.batch.flush-interval-ms=5000
homepage.recommendations.trending.batch.max-buffer-size=500
homepage.recommendations.nats.enabled=false
homepage.recommendations.nats.url=${NATS_URL:nats://localhost:4222}
homepage.recommendations.nats.stream-name=BBMOVIE_PLAYBACK
homepage.recommendations.nats.subject=playback.tracking.v1
homepage.recommendations.nats.consumer-durable=homepage-recommendations-playback

# Match watch-history when enabling trending pipeline end-to-end
# watch-history: watch-history.tracking.nats.enabled=true
