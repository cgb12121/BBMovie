spring.application.name=payment-orchestrator-service

# --- local dev defaults (override in higher envs) ---
server.port=8999

spring.datasource.url=${DATABASE_URL}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

management.endpoints.web.exposure.include=health,info
spring.threads.virtual.enabled=true

# --- async/threading ---
app.thread-pool.io.core-size=8
app.thread-pool.io.max-size=32
app.thread-pool.io.queue-capacity=1000
app.thread-pool.io.keep-alive-seconds=60

# --- idempotency L1 cache (Redis) ---
spring.data.redis.host=localhost
spring.data.redis.port=6379
app.idempotency.cache.enabled=true
app.idempotency.cache.ttl-seconds=900

# --- kafka events ---
spring.kafka.bootstrap-servers=localhost:9092
app.kafka.events.enabled=false
app.kafka.topic.payment-events=commerce.payment.events.v1

# --- stripe ---
app.payment.stripe.secret-key=${STRIPE_SECRET_KEY:EMPTY}
app.payment.stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:EMPTY}

# --- paypal ---
app.payment.paypal.client-id=${PAYPAL_CLIENT_ID:}
app.payment.paypal.client-secret=${PAYPAL_CLIENT_SECRET}
app.payment.paypal.base-url=https://sandbox.paypal.com
app.payment.paypal.webhook-id=${PAYPAL_WEBHOOK_ID}
