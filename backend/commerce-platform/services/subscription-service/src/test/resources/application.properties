spring.datasource.url=jdbc:h2:mem:subscription_service_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=subscription-service-test
spring.kafka.listener.auto-startup=false

app.kafka.topic.payment-events=commerce.payment.events.v1
