spring.application.name=promotion-service
server.port=8083

spring.datasource.url=jdbc:mysql://localhost:3306/bbmovie_promotion
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:123456}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

promotion.rules.resource=${PROMOTION_RULES_RESOURCE:classpath:promotions-rules.json}
promotion.rules.reload-ms=${PROMOTION_RULES_RELOAD_MS:30000}
