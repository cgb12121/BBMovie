# =============================================================
# Revenue Dashboard - Application Configuration
# =============================================================

spring.application.name=revenue-dashboard
server.port=8120

# Disable default DataSource (we use ClickHouse only)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

# =============================================================
# Vaadin (internal admin UI)
# =============================================================
vaadin.launch-browser=false

# =============================================================
# Eureka (Service Discovery)
# =============================================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

# =============================================================
# ClickHouse (Analytics OLAP)
# =============================================================
revenue.analytics.clickhouse.enabled=${REVENUE_CLICKHOUSE_ENABLED:true}
revenue.analytics.clickhouse.jdbc-url=${REVENUE_CLICKHOUSE_JDBC_URL:jdbc:clickhouse://localhost:8123/bbmovie_analytics}
revenue.analytics.clickhouse.username=${REVENUE_CLICKHOUSE_USERNAME:default}
revenue.analytics.clickhouse.password=${REVENUE_CLICKHOUSE_PASSWORD:}

# =============================================================
# Redis (Vaadin Session Store + Caching)
# =============================================================
spring.data.redis.host=localhost
spring.data.redis.port=6379

# =============================================================
# NATS (Consume payment events)
# =============================================================
revenue.analytics.messaging.nats.enabled=${REVENUE_NATS_ENABLED:true}
revenue.analytics.messaging.nats.url=${REVENUE_NATS_URL:nats://localhost:4222}

# =============================================================
# Security (OAuth2 Resource Server - JWT validation)
# =============================================================
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8080/.well-known/jwks.json

# =============================================================
# Logging
# =============================================================
logging.level.com.bbmovie.revenuedashboard=DEBUG
logging.level.com.bbmovie.revenuedashboard.event=INFO
logging.level.com.clickhouse=INFO
